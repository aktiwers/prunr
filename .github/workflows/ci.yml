name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  clippy:
    name: Clippy (workspace, all targets)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install Linux dependencies
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libxdo-dev

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: clippy-x86_64-unknown-linux-gnu

      - name: Run clippy (deny warnings)
        run: cargo clippy --workspace --all-targets --no-deps -- -D warnings

  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libxdo-dev

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Restore model cache
        id: cache-models
        uses: actions/cache@v4
        with:
          # Cache only the bundled .zst files — the raw .onnx are
          # ~2× larger and never read at build time. Halves cache
          # upload/restore time and keeps us further from the 10 GB
          # eviction threshold.
          path: models/*.zst
          # Include the registry so an `OnDemand`-only SHA256 bump
          # (no xtask change) busts the cache instead of restoring
          # stale bytes.
          key: models-v3-${{ hashFiles('xtask/src/main.rs', 'crates/prunr-models/src/lib.rs') }}

      - name: Fetch models (cache miss)
        if: steps.cache-models.outputs.cache-hit != 'true'
        run: cargo xtask fetch-models

      - name: Compress models to .zst (if needed)
        shell: bash
        run: |
          for f in models/*.onnx; do
            if [ -f "$f" ] && [ ! -f "$f.zst" ]; then
              echo "Compressing $f ..."
              zstd -19 "$f" -o "$f.zst"
            fi
          done

      - name: Build
        run: cargo build --target ${{ matrix.target }}

      # Phase 20-05: install the ORT runtime on Linux x86_64 so the
      # `golden_e2e` integration test (and `reference_test` family)
      # exercises real Silueta inference instead of soft-skipping.
      # Other platforms: tests soft-skip when no runtime is found —
      # the postprocess golden tier runs everywhere regardless (no
      # ORT needed) and is the bit-exact safety net.
      - name: Cache ORT runtime data dir (Linux x86_64)
        id: cache-ci-runtime
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        uses: actions/cache@v4
        with:
          path: ~/.local/share/prunr/runtimes
          key: ci-runtime-linux-${{ hashFiles('crates/prunr-runtime-install/src/lib.rs') }}

      - name: Install ORT runtime (Linux x86_64)
        if: matrix.target == 'x86_64-unknown-linux-gnu' && steps.cache-ci-runtime.outputs.cache-hit != 'true'
        run: cargo xtask install-runtime onnxruntime 1.24.1

      - name: Test
        run: cargo test --target ${{ matrix.target }} --features prunr-models/dev-models
