name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-13
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libxdo-dev

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Restore model cache
        id: cache-models
        uses: actions/cache@v4
        with:
          path: models/
          key: models-v2-${{ hashFiles('xtask/src/main.rs') }}

      - name: Fetch models (cache miss)
        if: steps.cache-models.outputs.cache-hit != 'true'
        run: cargo xtask fetch-models

      - name: Compress models to .zst (if needed)
        shell: bash
        run: |
          for f in models/*.onnx; do
            if [ -f "$f" ] && [ ! -f "$f.zst" ]; then
              echo "Compressing $f ..."
              zstd -19 "$f" -o "$f.zst"
            fi
          done

      - name: Build
        run: cargo build --target ${{ matrix.target }}

      - name: Test
        run: cargo test --target ${{ matrix.target }} --features prunr-models/dev-models
