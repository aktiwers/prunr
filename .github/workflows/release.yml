name: Release

on:
  push:
    tags: ["v*"]
  # Manual trigger so we can iterate on CI changes (CoreML build,
  # dylib bundling, etc.) without tagging an actual release. The job
  # still produces artifacts but skips the GitHub-release step.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: prunr
          - name: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            binary: prunr
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: prunr.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxdo-dev icnsutils rpm

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Restore model cache
        id: cache-models
        uses: actions/cache@v4
        with:
          path: models/
          key: models-v2-${{ hashFiles('xtask/src/main.rs') }}

      - name: Fetch models (cache miss)
        if: steps.cache-models.outputs.cache-hit != 'true'
        run: cargo xtask fetch-models

      - name: Compress models to .zst (if needed)
        shell: bash
        run: |
          for f in models/*.onnx; do
            if [ -f "$f" ] && [ ! -f "$f.zst" ]; then
              echo "Compressing $f ..."
              zstd -19 "$f" -o "$f.zst"
            fi
          done

      # Patch version from git tag into Info.plist before building.
      # Skipped on workflow_dispatch (no tag → keep the in-repo placeholder).
      - name: Patch macOS Info.plist version
        if: matrix.name == 'macos-aarch64' && github.event_name == 'push'
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -i '' "s|<string>[0-9]*\.[0-9]*\.[0-9]*</string>|<string>${VERSION}</string>|g" assets/Info.plist

      # ── Custom ORT with CoreML (macOS only) ──
      # Linux/Windows use the `download-binaries` prebuilt automatically.
      # macOS needs CoreML, which the prebuilt doesn't include — build from
      # source and override via ORT_LIB_LOCATION + ORT_PREFER_DYNAMIC_LINK.
      # The binary's rpath is set via `.cargo/config.toml` rustflags so the
      # bundled .app finds the dylib in Contents/Frameworks/ at runtime.
      # First build ~30 min; cache by ORT version restores in ~30 sec.
      - name: Cache ORT (macOS, with CoreML)
        if: matrix.name == 'macos-aarch64'
        id: ort-cache
        uses: actions/cache@v4
        with:
          # ORT 1.20's build.sh writes dylib to <build_dir>/<config>/, no OS
          # subdir on macOS — verified empirically (run #5 failed because we
          # cached the wrong path).
          path: ort-build/Release
          key: ort-coreml-1.20.0-macos-aarch64-v2

      - name: Install ORT build prereqs (macOS, cache miss)
        if: matrix.name == 'macos-aarch64' && steps.ort-cache.outputs.cache-hit != 'true'
        run: |
          # ORT 1.20.0 pulls eigen via FetchContent from a pinned commit on
          # gitlab.com, which the runner network blocks/rate-limits in 2026.
          # `brew install eigen` provides a stable Eigen3 install with cmake
          # config files; build.sh's --use_preinstalled_eigen makes ORT
          # find_package(Eigen3) instead of downloading.
          brew install eigen

      - name: Build ORT with CoreML (macOS, cache miss)
        if: matrix.name == 'macos-aarch64' && steps.ort-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch v1.20.0 \
            https://github.com/microsoft/onnxruntime.git ort-src
          cd ort-src
          # CMAKE_POLICY_VERSION_MINIMUM=3.5: macOS runners ship CMake 4.x,
          # which drops support for cmake_minimum_required < 3.5. ORT 1.20.0's
          # transitive dep google_nsync still declares 2.x. The minimum-policy
          # override lets the legacy CMakeLists configure under modern CMake.
          ./build.sh \
            --config Release \
            --use_coreml \
            --build_shared_lib \
            --parallel \
            --compile_no_warning_as_error \
            --skip_submodule_sync \
            --skip_tests \
            --osx_arch arm64 \
            --use_preinstalled_eigen \
            --eigen_path "$(brew --prefix eigen)/include/eigen3" \
            --build_dir ../ort-build \
            --cmake_extra_defines CMAKE_POLICY_VERSION_MINIMUM=3.5

      - name: Point cargo at custom ORT (macOS)
        if: matrix.name == 'macos-aarch64'
        run: |
          # Discover the dylib instead of assuming a fixed subdir — keeps us
          # robust if ORT changes its build_dir layout in a future bump.
          DYLIB=$(find ort-build -name 'libonnxruntime.dylib' -type f | head -1)
          if [ -z "$DYLIB" ]; then
            echo "::error::No libonnxruntime.dylib under ort-build/"
            find ort-build -maxdepth 3 -type d 2>&1 | head -40
            exit 1
          fi
          ORT_DIR="$(cd "$(dirname "$DYLIB")" && pwd)"
          echo "Resolved ORT_LIB_LOCATION=$ORT_DIR"
          echo "ORT_LIB_LOCATION=$ORT_DIR" >> "$GITHUB_ENV"
          echo "ORT_PREFER_DYNAMIC_LINK=1" >> "$GITHUB_ENV"

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p prunr-app

      # On macOS the custom ORT build sits in ort-build/, not next to the
      # binary. Stage it into target/release/ so the existing Phase 6-01
      # bundling steps pick it up.
      - name: Stage custom ORT dylib for bundling (macOS)
        if: matrix.name == 'macos-aarch64'
        run: |
          mkdir -p "target/${{ matrix.target }}/release"
          cp -P "$ORT_LIB_LOCATION"/libonnxruntime.*dylib \
                "target/${{ matrix.target }}/release/"

      # ── Linux: .tar.gz + .AppImage + .deb + .rpm ──
      # The pykeio/ort `download-binaries` feature STATIC-links libonnxruntime
      # into the binary on Linux/Windows; only the GPU provider plugins ship
      # as separate .so files in target/release/. Pure-CPU users get a
      # self-contained binary; GPU users need the system's CUDA/etc anyway.
      # We don't bundle the providers — falling back to CPU on a clean machine
      # is acceptable for v1.
      - name: Package Linux tar.gz
        if: matrix.name == 'linux-x86_64'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} dist/
          cd dist && tar czf ../prunr-linux-x86_64.tar.gz ${{ matrix.binary }}

      - name: Package Linux AppImage
        if: matrix.name == 'linux-x86_64'
        run: |
          mkdir -p AppDir/usr/bin AppDir/usr/share/icons/hicolor/256x256/apps
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} AppDir/usr/bin/
          cp assets/prunr-256.png AppDir/usr/share/icons/hicolor/256x256/apps/prunr.png
          cp assets/prunr-256.png AppDir/prunr.png
          cp assets/prunr.desktop AppDir/
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          ARCH=x86_64 ./appimagetool-x86_64.AppImage AppDir/ Prunr-x86_64.AppImage

      - name: Package Linux .deb
        if: matrix.name == 'linux-x86_64'
        run: |
          mkdir -p deb/usr/bin deb/usr/share/applications deb/usr/share/icons/hicolor/256x256/apps deb/DEBIAN
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} deb/usr/bin/
          cp assets/prunr.desktop deb/usr/share/applications/
          cp assets/prunr-256.png deb/usr/share/icons/hicolor/256x256/apps/prunr.png
          # Tag pushes carry the version in the ref (v0.4.8 → 0.4.8).
          # workflow_dispatch runs from a branch — fall back to Cargo.toml
          # so the .deb / .rpm version always satisfies dpkg/rpm's
          # "must start with a digit" rule.
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION=$(awk -F'"' '/^version/ {print $2; exit}' Cargo.toml)
          fi
          SIZE=$(du -s deb/usr | cut -f1)
          cat > deb/DEBIAN/control << CTRL
          Package: prunr
          Version: ${VERSION}
          Architecture: amd64
          Maintainer: Prunr <prunr@example.com>
          Depends: libgtk-3-0, libxkbcommon0, libfontconfig1
          Section: graphics
          Priority: optional
          Installed-Size: ${SIZE}
          Description: Local AI background removal
           Remove backgrounds from images using ONNX neural networks.
           Ships with embedded models - no cloud, no API keys.
          CTRL
          # Remove leading spaces from heredoc
          sed -i 's/^          //' deb/DEBIAN/control
          dpkg-deb --build deb prunr-linux-x86_64.deb

      - name: Package Linux .rpm
        if: matrix.name == 'linux-x86_64'
        run: |
          # Same version-from-tag-or-Cargo.toml pattern as .deb above.
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION=$(awk -F'"' '/^version/ {print $2; exit}' Cargo.toml)
          fi
          mkdir -p rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} rpmbuild/SOURCES/
          cp assets/prunr.desktop rpmbuild/SOURCES/
          cp assets/prunr-256.png rpmbuild/SOURCES/
          cat > rpmbuild/SPECS/prunr.spec << 'SPEC'
          Name:           prunr
          Version:        VERSION_PLACEHOLDER
          Release:        1%{?dist}
          Summary:        Local AI background removal
          License:        Apache-2.0
          URL:            https://github.com/aktiwers/prunr

          %description
          Remove backgrounds from images using ONNX neural networks.
          Ships with embedded models — no cloud, no API keys.

          %install
          install -Dm755 %{_sourcedir}/prunr %{buildroot}%{_bindir}/prunr
          install -Dm644 %{_sourcedir}/prunr.desktop %{buildroot}%{_datadir}/applications/prunr.desktop
          install -Dm644 %{_sourcedir}/prunr-256.png %{buildroot}%{_datadir}/icons/hicolor/256x256/apps/prunr.png

          %files
          %{_bindir}/prunr
          %{_datadir}/applications/prunr.desktop
          %{_datadir}/icons/hicolor/256x256/apps/prunr.png
          SPEC
          sed -i 's/^          //' rpmbuild/SPECS/prunr.spec
          sed -i "s/VERSION_PLACEHOLDER/${VERSION}/" rpmbuild/SPECS/prunr.spec
          rpmbuild --define "_topdir $(pwd)/rpmbuild" -bb rpmbuild/SPECS/prunr.spec
          cp rpmbuild/RPMS/x86_64/*.rpm prunr-linux-x86_64.rpm || true

      - name: Upload Linux artifacts
        if: matrix.name == 'linux-x86_64'
        uses: actions/upload-artifact@v4
        with:
          name: prunr-linux-x86_64
          path: |
            prunr-linux-x86_64.tar.gz
            Prunr-x86_64.AppImage
            prunr-linux-x86_64.deb
            prunr-linux-x86_64.rpm

      # ── macOS: .tar.gz + .dmg ──
      - name: Generate .icns
        if: matrix.name == 'macos-aarch64'
        run: |
          mkdir -p prunr.iconset
          sips -z 256 256 assets/prunr-256.png --out prunr.iconset/icon_256x256.png
          sips -z 128 128 assets/prunr-256.png --out prunr.iconset/icon_128x128.png
          sips -z 64 64 assets/prunr-256.png --out prunr.iconset/icon_64x64.png
          sips -z 32 32 assets/prunr-256.png --out prunr.iconset/icon_32x32.png
          sips -z 16 16 assets/prunr-256.png --out prunr.iconset/icon_16x16.png
          iconutil -c icns prunr.iconset -o assets/prunr.icns

      - name: Package macOS .app + .dmg
        if: matrix.name == 'macos-aarch64'
        run: |
          mkdir -p Prunr.app/Contents/{MacOS,Frameworks,Resources}
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} Prunr.app/Contents/MacOS/
          # Bundle ORT dylib in Frameworks/ so the .app runs on a clean Mac
          # without system-wide ORT. ORT's `download-binaries` feature drops
          # libonnxruntime.dylib next to the binary in target/release/.
          if ls target/${{ matrix.target }}/release/libonnxruntime.*dylib 1> /dev/null 2>&1; then
            cp target/${{ matrix.target }}/release/libonnxruntime.*dylib Prunr.app/Contents/Frameworks/
          else
            echo "::error::libonnxruntime.dylib not found — release would fail on clean Macs"
            exit 1
          fi
          cp assets/Info.plist Prunr.app/Contents/
          cp assets/prunr.icns Prunr.app/Contents/Resources/
          # Ad-hoc sign so Gatekeeper doesn't immediately block (signs the
          # bundled dylib as well via --deep)
          codesign --force --deep --sign - Prunr.app
          # Create DMG
          brew install create-dmg
          create-dmg \
            --volname "Prunr" \
            --window-size 600 400 \
            --icon "Prunr.app" 175 200 \
            --app-drop-link 425 200 \
            --no-internet-enable \
            "Prunr-macos-aarch64.dmg" \
            "Prunr.app"

      - name: Package macOS tar.gz
        if: matrix.name == 'macos-aarch64'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} dist/
          cp target/${{ matrix.target }}/release/libonnxruntime.*dylib dist/
          cd dist && tar czf ../prunr-macos-aarch64.tar.gz *

      - name: Upload macOS artifacts
        if: matrix.name == 'macos-aarch64'
        uses: actions/upload-artifact@v4
        with:
          name: prunr-macos-aarch64
          path: |
            Prunr-macos-aarch64.dmg
            prunr-macos-aarch64.tar.gz

      # ── Windows: .zip + .exe installer ──
      # Same as Linux: ORT is static-linked into prunr.exe by download-binaries.
      # No onnxruntime.dll needs to ship; CPU EP is built in.
      - name: Package Windows zip
        if: matrix.name == 'windows-x86_64'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" dist/
          Compress-Archive -Path "dist/*" -DestinationPath "prunr-windows-x86_64.zip"

      - name: Package Windows installer (Inno Setup)
        if: matrix.name == 'windows-x86_64'
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          @"
          [Setup]
          AppName=Prunr
          AppVersion=$version
          DefaultDirName={autopf}\Prunr
          DefaultGroupName=Prunr
          OutputDir=.
          OutputBaseFilename=prunr-windows-x86_64-setup
          Compression=lzma2
          SolidCompression=yes
          SetupIconFile=assets\prunr.ico
          UninstallDisplayIcon={app}\prunr.exe

          [Files]
          Source: "target\${{ matrix.target }}\release\${{ matrix.binary }}"; DestDir: "{app}"; Flags: ignoreversion

          [Icons]
          Name: "{group}\Prunr"; Filename: "{app}\prunr.exe"; IconFilename: "{app}\prunr.exe"
          Name: "{commondesktop}\Prunr"; Filename: "{app}\prunr.exe"; IconFilename: "{app}\prunr.exe"
          "@ | Out-File -Encoding UTF8 setup.iss
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" setup.iss

      - name: Upload Windows artifacts
        if: matrix.name == 'windows-x86_64'
        uses: actions/upload-artifact@v4
        with:
          name: prunr-windows-x86_64
          path: |
            prunr-windows-x86_64.zip
            prunr-windows-x86_64-setup.exe

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
